<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0e1e3a"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00d4ff"/>
      <stop offset="70%" stop-color="#0055ff"/>
      <stop offset="100%" stop-color="#7700ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00eeff"/>
      <stop offset="60%" stop-color="#4499ff"/>
      <stop offset="100%" stop-color="#aa55ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
 
  <!-- Background -->
  <rect width="900" height="160" fill="url(#bg)" rx="12"/>
 
  <!-- Grid lines -->
  <g opacity="0.05" stroke="#3080ff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="100" y1="0" x2="100" y2="160"/>
    <line x1="200" y1="0" x2="200" y2="160"/>
    <line x1="300" y1="0" x2="300" y2="160"/>
    <line x1="400" y1="0" x2="400" y2="160"/>
    <line x1="500" y1="0" x2="500" y2="160"/>
    <line x1="600" y1="0" x2="600" y2="160"/>
    <line x1="700" y1="0" x2="700" y2="160"/>
    <line x1="800" y1="0" x2="800" y2="160"/>
  </g>
 
  <!-- Circuit traces left -->
  <g opacity="0.2" fill="none" stroke="#00aaff" stroke-width="1">
    <path d="M20 50 H60 L80 70 H120"/>
    <path d="M20 110 H55 L70 95 H100"/>
    <circle cx="60" cy="50" r="2" fill="#00aaff"/>
    <circle cx="120" cy="70" r="2" fill="#00aaff"/>
    <circle cx="55" cy="110" r="2" fill="#00aaff"/>
  </g>
 
  <!-- Circuit traces right -->
  <g opacity="0.2" fill="none" stroke="#6644ff" stroke-width="1">
    <path d="M880 40 H840 L820 60 H780"/>
    <path d="M880 120 H845 L830 105 H800"/>
    <circle cx="840" cy="40" r="2" fill="#6644ff"/>
    <circle cx="780" cy="60" r="2" fill="#6644ff"/>
  </g>
 
  <!-- Glow dots scattered -->
  <circle cx="150" cy="25" r="1.5" fill="#00d4ff" opacity="0.5"/>
  <circle cx="750" cy="135" r="1.5" fill="#00d4ff" opacity="0.4"/>
  <circle cx="820" cy="30" r="1" fill="#8855ff" opacity="0.5"/>
  <circle cx="80" cy="140" r="1" fill="#00aaff" opacity="0.4"/>
 
  <!-- Bottom accent line -->
  <rect x="0" y="154" width="900" height="2" fill="url(#line)" rx="1"/>
  <!-- Top accent line -->
  <rect x="0" y="4" width="900" height="1" fill="url(#line)" rx="1" opacity="0.5"/>
 
  <!-- Main name -->
  <text x="450" y="72" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="38" font-weight="700"
    fill="url(#text-grad)" filter="url(#glow)" letter-spacing="6">
    RAHIL POPAT
  </text>
 
  <!-- Subtitle -->
  <text x="450" y="106" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="13"
    fill="#4488cc" letter-spacing="3">
    AERONAUTICAL ENGINEER  ·  PRODUCT OWNER  ·  AI BUILDER
  </text>
 
  <!-- London tag -->
  <text x="450" y="130" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="11"
    fill="#225588" letter-spacing="2">
    ◈  LONDON
  </text>
 
  <!-- Corner brackets -->
  <g stroke="#00aaff" stroke-width="1.5" opacity="0.5" fill="none">
    <path d="M14 30 V14 H30"/>
    <path d="M870 14 H886 V30"/>
    <path d="M14 130 V146 H30"/>
    <path d="M870 146 H886 V130"/>
  </g>
</svg>
